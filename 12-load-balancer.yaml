apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
spec:
  selector:
    app: swiggy
  ports:
  - name: lb
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: v1
kind: Pod
metadata:
  name: swiggy-app
  labels:
    app: swiggy
spec:
  containers:
  - name: nginx-cont
    image: nginx