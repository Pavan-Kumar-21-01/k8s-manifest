apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: zomato
  labels:
    app: zomato
spec:
  replicas: 5
  selector:
    matchLabels:
      app: zomato
      tier: frontend
  template:
    metadata:
      labels:
        app: zomato
        tier: frontend
    spec:
      containers:
      - name: nginx-cont
        image: sreeharshav/rollingupdate:v1
---
apiVersion: v1
kind: Service
metadata:
  name: zomato-np
spec:
  selector:
    app: zomato
    tier: frontend
  ports:
  - name: np
    port: 80
    targetPort: 80
  type: NodePort