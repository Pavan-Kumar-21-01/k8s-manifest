apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  course: devops
  duration: 120hrs
  enroll: pavan

---
apiVersion: v1
kind: Pod
metadata:
  name: cm
spec:
  containers:
  - name: cm
    image: nginx
    env:
      - name: course
        valueFrom: 
          configMapKeyRef:
            name: config #name of the config map
            key: course #env.name and key name can be different
      - name: time
        valueFrom:
          configMapKeyRef:
            name: config
            key: duration
      - name: person
        valueFrom:
          configMapKeyRef:
            name: config
            key: enroll